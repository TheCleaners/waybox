# A SourceHut build manifest. See https://man.sr.ht/builds.sr.ht/manifest.md
# for more information.
#
image: archlinux
packages:
  - clang
  - gcc
  - libevdev
  - libinput
  - libxkbcommon
  - libxml2
  - meson
  - wayland
  - wayland-protocols
  - wlroots-git
  - xorg-server-xwayland
sources:
  - https://github.com/wizbright/waybox
tasks:
  - setup: |
      cd waybox
      CC=gcc CXX=g++ meson setup build-gcc -Dsanitize=disabled
  - build: |
      cd waybox
      ninja -C build-gcc
  - clang: |
      cd waybox
      CC=clang CXX=clang++ meson setup build-clang -Dsanitize=disabled
      ninja -C build-clang
