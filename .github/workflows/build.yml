# A GitHub Actions port of the old .build.yml.  This has the advantage of being
# able to use GitHub actions, contexts, secrets, etc, to do more in the future
# than merely check whether a build succeeds or fails.  It also allows to see
# whether builds succeed or fail on forks, which also has its advantages.
#
# The disadvantage is that it's less portable than .build.yml, which will work
# on at least GitHub, GitLab, and SourceHut, where GitHub Actions only work on
# GitHub.
#
name: build
on: [push, pull_request]
jobs:
    build:
        runs-on: ubuntu-latest
        container: alpine:edge
        steps:
            - name: packages
              run: |
                apk add clang g++ gcc libevdev-dev libinput-dev libxkbcommon-dev libxml2-dev meson musl-dev wayland-dev wayland-protocols wlroots wlroots-dev xwayland
            # actions/checkout@v7 clones the repository
            - uses: actions/checkout@v7
            - name: build-gcc
              run: |
                CC=gcc CXX=g++ meson setup build-gcc -Dsanitize=disabled
                ninja -C build-gcc
                meson test -C build-gcc --print-errorlogs
            - name: build-clang
              run: |
                CC=clang CXX=clang++ meson setup build-clang -Dsanitize=disabled
                ninja -C build-clang
                meson test -C build-clang --print-errorlogs

    # Run the dependency-free unit tests under AddressSanitizer +
    # UndefinedBehaviorSanitizer. This uses a stock Ubuntu image (which has
    # libasan/libubsan) and the tests_only build, so it needs no wlroots — the
    # pure logic (geometry, placement, actions, ...) is exercised sanitized on
    # every push, which the Alpine build cannot do (its toolchain lacks the
    # sanitizer runtimes).
    sanitized-tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: packages
              run: |
                sudo apt-get update
                sudo apt-get install -y meson ninja-build g++ python3
            - name: build-and-test
              run: |
                CC=gcc CXX=g++ meson setup build-asan -Dtests_only=true -Dsanitize=enabled
                meson test -C build-asan --print-errorlogs
